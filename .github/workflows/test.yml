name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  track-b-tests:
    name: Track B (PyTorch / discrete features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyTorch (CPU)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package with dev and ML extras
        run: pip install -e ".[dev,ml]"

      - name: Run Track B tests
        run: pytest tests/test_discrete/ tests/test_features/ -v

  track-a-tests:
    name: Track A (SageMath / conformal geometry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: sage
          create-args: >-
            sage python=3.11 pytest
          channels: conda-forge

      - name: Run Track A tests
        run: micromamba run -n sage sage -python -m pytest tests/test_core/ tests/test_tractor/ tests/test_hypersurface/ tests/test_carroll/ tests/test_pe/ tests/test_export/ -v
